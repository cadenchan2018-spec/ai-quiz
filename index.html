<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俊彥教育中心(康sir)_出卷網站</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --ink: #1a1a2e;
            --ink-light: #4a4a6a;
            --paper: #faf9f6;
            --paper-warm: #f5f2ec;
            --red: #c0392b;
            --red-light: #e74c3c;
            --gold: #b8860b;
            --blue: #1a4a8a;
            --blue-light: #2e6db4;
            --green: #1a6b4a;
            --border: #d4cfc5;
            --shadow: rgba(26,26,46,0.10);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

        /* Header */
        .site-header {
            background: var(--ink); color: #fff;
            padding: 0 2rem; height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 2px 12px rgba(0,0,0,0.25);
        }
        .logo {
            font-family: 'Noto Serif TC', serif;
            font-size: 1.2rem; font-weight: 900; letter-spacing: 0.05em;
            display: flex; align-items: center; gap: 10px;
        }
        .logo-icon {
            width: 34px; height: 34px; background: var(--red);
            border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px;
        }
        .header-sub { font-size: 0.75rem; color: rgba(255,255,255,0.45); letter-spacing: 0.12em; }

        /* Auth Bar */
        .auth-bar {
            background: var(--paper-warm); border-bottom: 1px solid var(--border);
            padding: 10px 2rem; display: flex; align-items: center;
            justify-content: space-between; gap: 12px; flex-wrap: wrap;
        }
        .auth-status { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: var(--ink-light); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #bbb; flex-shrink: 0; transition: background 0.3s; }
        .status-dot.active { background: #27ae60; }
        .auth-hint { font-size: 0.72rem; color: #aaa; margin-top: 3px; }
        .auth-controls { display: flex; align-items: center; gap: 8px; }
        .btn-google {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 7px 14px; border: 1px solid var(--border); border-radius: 999px;
            background: #fff; color: var(--ink); font-size: 0.82rem; font-family: inherit; font-weight: 700;
            cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s, transform 0.1s;
        }
        .btn-google:hover { border-color: var(--blue-light); box-shadow: 0 2px 8px rgba(26,74,138,0.12); }
        .btn-google:active { transform: scale(0.97); }
        .btn-google:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }
        .google-mark {
            width: 18px; height: 18px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 0.9rem; color: #4285f4; background: #fff;
        }
        .hidden { display: none !important; }
        .btn-sm {
            padding: 6px 14px; border: none; border-radius: 6px;
            font-size: 0.82rem; font-family: inherit; font-weight: 700;
            cursor: pointer; transition: opacity 0.15s, transform 0.1s;
        }
        .btn-sm:active { transform: scale(0.97); }
        .btn-login { background: var(--blue); color: #fff; }
        .btn-login:hover { background: var(--blue-light); }
        .btn-login:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .btn-logout { background: #e8e3d8; color: var(--ink-light); }
        .btn-logout:hover { background: #ddd8cc; }

        /* Main */
        .main-wrap { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
        .page-title { font-family: 'Noto Serif TC', serif; font-size: 1.6rem; font-weight: 900; margin-bottom: 0.3rem; }
        .page-subtitle { font-size: 0.85rem; color: var(--ink-light); margin-bottom: 2rem; }

        /* Cards */
        .card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px var(--shadow); }
        .card-title {
            font-family: 'Noto Serif TC', serif; font-size: 1rem; font-weight: 700;
            margin-bottom: 1rem; display: flex; align-items: center; gap: 8px;
        }
        .step-badge {
            background: var(--ink); color: white;
            font-family: 'Noto Sans TC', sans-serif; font-size: 0.68rem;
            font-weight: 700; padding: 2px 8px; border-radius: 20px; letter-spacing: 0.06em;
        }
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; margin-bottom: 1.5rem; }
        @media (max-width: 640px) { .two-col { grid-template-columns: 1fr; } }

        /* Selects */
        .select-row { display: flex; gap: 8px; margin-bottom: 12px; }
        select {
            flex: 1; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px;
            font-family: inherit; font-size: 0.88rem; color: var(--ink);
            background: white; outline: none; cursor: pointer; transition: border-color 0.2s;
        }
        select:focus { border-color: var(--blue-light); }

        /* Topics */
        #topicsContainer { max-height: 400px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; background: var(--paper-warm); }
        
        /* 主 topic 行 */
        .topic-group-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 12px; border-bottom: 1px solid var(--border);
            background: #f5f2ec; cursor: pointer; transition: background 0.15s;
            font-weight: 700; font-size: 0.9rem;
        }
        .topic-group-header:hover { background: #eee9df; }
        .topic-group-header.collapsed { border-bottom: none; }
        .topic-toggle { 
            font-size: 0.75rem; color: var(--ink-light); 
            transition: transform 0.2s; display: inline-block;
        }
        .topic-toggle.expanded { transform: rotate(90deg); }
        
        /* 子 topic 行（題型） */
        .topic-subrow {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 12px 8px 32px; border-bottom: 1px solid #e8e3d8;
            background: white; transition: background 0.15s;
        }
        .topic-subrow:last-child { border-bottom: 1px solid var(--border); }
        .topic-subrow:hover { background: #faf9f6; }
        .topic-subrow.hidden { display: none; }
        
        .topic-name { font-size: 0.88rem; }
        .topic-type-label { font-size: 0.82rem; color: var(--ink-light); }
        .topic-qty {
            width: 52px; text-align: center; padding: 4px 6px;
            border: 1px solid var(--border); border-radius: 6px;
            font-family: inherit; font-size: 0.88rem; background: white; outline: none;
        }
        .topic-qty:focus { border-color: var(--blue-light); }
        #topicsContainer::-webkit-scrollbar { width: 6px; }
        #topicsContainer::-webkit-scrollbar-track { background: transparent; }
        #topicsContainer::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .topic-left { display:flex; align-items:center; gap:8px; }
        .topic-pick { width: 16px; height: 16px; accent-color: var(--blue); cursor: pointer; }
        .mode-row { display:flex; gap:14px; margin-bottom:10px; align-items:center; flex-wrap:wrap; }
        .mode-row .radio-label { margin: 0; }
        .balanced-panel {
            border: 1px dashed var(--border);
            border-radius: 8px;
            background: #fff;
            padding: 10px 12px;
            margin-bottom: 10px;
        }
        .balanced-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
        .balanced-grid input {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
        }
        @media (max-width: 640px) { .balanced-grid { grid-template-columns:1fr; } }

        /* Textarea */
        textarea {
            width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
            font-family: inherit; font-size: 0.9rem; color: var(--ink);
            background: white; resize: vertical; outline: none; line-height: 1.7; transition: border-color 0.2s;
        }
        textarea:focus { border-color: var(--blue-light); }
        textarea::placeholder { color: #ccc; }

        /* Radio */
        .radio-group { display: flex; gap: 16px; margin-top: 10px; }
        .radio-label { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; color: var(--ink-light); cursor: pointer; }
        .radio-label input { accent-color: var(--blue); cursor: pointer; }

        /* Generate */
        .generate-wrap { text-align: center; margin: 2rem 0 1.5rem; }
        .btn-generate {
            background: var(--red); color: white; border: none;
            padding: 16px 48px; border-radius: 50px;
            font-family: 'Noto Serif TC', serif; font-size: 1.15rem; font-weight: 700;
            cursor: pointer; letter-spacing: 0.08em;
            box-shadow: 0 4px 20px rgba(192,57,43,0.35);
            transition: background 0.2s, transform 0.12s, box-shadow 0.2s;
        }
        .btn-generate:hover { background: var(--red-light); box-shadow: 0 6px 28px rgba(192,57,43,0.45); transform: translateY(-2px); }
        .btn-generate:active { transform: scale(0.98); }

        /* Download */
        .download-row { display: flex; justify-content: center; gap: 12px; margin-bottom: 2rem; }
        .btn-dl {
            padding: 10px 24px; border: none; border-radius: 8px;
            font-family: inherit; font-size: 0.9rem; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; gap: 6px;
            transition: opacity 0.15s, transform 0.1s;
        }
        .btn-dl:active { transform: scale(0.97); }
        .btn-dl-student { background: var(--ink); color: white; }
        .btn-dl-student:hover { opacity: 0.85; }
        .btn-dl-teacher { background: var(--green); color: white; }
        .btn-dl-teacher:hover { opacity: 0.85; }

        /* Loading */
        #loading { text-align: center; padding: 2.5rem; color: var(--blue-light); font-weight: 700; display: none; }
        .spinner {
            display: inline-block; width: 22px; height: 22px;
            border: 3px solid rgba(46,109,180,0.2); border-top-color: var(--blue-light);
            border-radius: 50%; animation: spin 0.7s linear infinite;
            margin-right: 10px; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Print area */
        #pdfPrintArea { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 48px; box-shadow: 0 2px 12px var(--shadow); display: none; }
        .question-item { page-break-inside: avoid !important; break-inside: avoid !important; margin-bottom: 22px; }
        .answer-block { display: none; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>

<script>
    const SUPABASE_URL = 'https://zasjttnsvqebepszpfua.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_mNcxBYS-z85Y1529nCgz7A_5DAewmV7';
    const dbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let databaseStructure = {};
    let databaseTypeCounts = {};

    function isBannedTopic(topic) {
        const t = (topic ?? '').toString().trim();
        if (!t) return false;
        return /連接詞/.test(t);
    }

    function shuffleInPlace(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function escapeHtml(s) {
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    /** 每個字元（含中文標點）之間插入全形空格；「——」「……」等雙連標點不拆開，避免破折號變成 —　— 兩截。 */
    function widenIdeographicSpacing(text) {
        if (text == null || text === '') return '';
        const sp = '\u3000';
        const mergePairs = [['\u2014', '\u2014'], ['\u2026', '\u2026'], ['\u2015', '\u2015']];
        function tokensFromCompact(compact) {
            const chars = Array.from(compact);
            const out = [];
            let i = 0;
            while (i < chars.length) {
                let hit = false;
                for (const [a, b] of mergePairs) {
                    if (chars[i] === a && chars[i + 1] === b) {
                        out.push(a + b);
                        i += 2;
                        hit = true;
                        break;
                    }
                }
                if (!hit) {
                    out.push(chars[i]);
                    i += 1;
                }
            }
            return out;
        }
        return String(text).split(/\r?\n/).map(line => {
            const trimmedEnd = line.replace(/\s+$/g, '');
            const compact = trimmedEnd.replace(/[\u3000\s]+/g, '');
            if (!compact) return '';
            return tokensFromCompact(compact).join(sp);
        }).join('\n');
    }

    /** 若該行（可含全形空格）以「標點符號：」開頭，只去掉此行標題、保留冒號後內文；避免整行被 filter 掉令題目消失。 */
    function stripLeadingPunctuationTopicLabel(line) {
        const trimmedEnd = line.replace(/\s+$/g, '');
        const collapsed = trimmedEnd.replace(/[\u3000\s]+/g, '');
        if (!/^標點符號[:：]/.test(collapsed)) return trimmedEnd;
        const sig = ['標', '點', '符', '號'];
        let pos = 0;
        const s = trimmedEnd;
        while (pos < s.length && /[\s\u3000]/.test(s[pos])) pos++;
        for (const ch of sig) {
            while (pos < s.length && /[\s\u3000]/.test(s[pos])) pos++;
            if (pos >= s.length || s[pos] !== ch) return trimmedEnd;
            pos++;
        }
        while (pos < s.length && /[\s\u3000]/.test(s[pos])) pos++;
        if (pos < s.length && (s[pos] === '：' || s[pos] === ':')) {
            pos++;
            while (pos < s.length && /[\s\u3000]/.test(s[pos])) pos++;
            return s.slice(pos);
        }
        return trimmedEnd;
    }

    /** 行首說明句（僅用於從題幹移除重複）；介面與區塊提示一律用繁體。簡體版若出現在題庫亦會剥掉，以免試卷混用。 */
    const INSTR_TRAD_SIG = ['在', '適', '當', '的', '位', '置', '加', '上', '標', '點', '符', '號'];
    const INSTR_SIMP_SIG = ['在', '适', '当', '的', '位', '置', '加', '上', '标', '点', '符', '号'];

    function stripKnownInstructionPrefix(s, sig) {
        let pos = 0;
        while (pos < s.length && /[\s\u3000]/.test(s[pos])) pos++;
        for (const ch of sig) {
            while (pos < s.length && /[\s\u3000]/.test(s[pos])) pos++;
            if (pos >= s.length || s[pos] !== ch) return s;
            pos++;
        }
        while (pos < s.length && /[\s\u3000]/.test(s[pos])) pos++;
        if (pos < s.length && (s[pos] === '。' || s[pos] === '．')) pos++;
        while (pos < s.length && /[\s\u3000]/.test(s[pos])) pos++;
        return s.slice(pos);
    }

    function stripAddPunctuationInstructionFromLine(line) {
        const trimmedEnd = line.replace(/\s+$/g, '');
        const collapsed = trimmedEnd.replace(/[\u3000\s]+/g, '');
        if (/^在適當的位置加上標點符號[。．]?/.test(collapsed))
            return stripKnownInstructionPrefix(trimmedEnd, INSTR_TRAD_SIG);
        if (/^在适当的位置加上标点符号[。．]?/.test(collapsed))
            return stripKnownInstructionPrefix(trimmedEnd, INSTR_SIMP_SIG);
        return trimmedEnd;
    }

    function normalizePunctuationTopicLine(line) {
        let x = line.replace(/\s+$/g, '');
        for (let i = 0; i < 4; i++) {
            const y = stripAddPunctuationInstructionFromLine(stripLeadingPunctuationTopicLabel(x));
            if (y === x) break;
            x = y;
        }
        return x;
    }

    function getSectionLabel(sectionIdx) {
        const labels = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
        if (sectionIdx >= 1 && sectionIdx <= labels.length) return `${labels[sectionIdx - 1]}部`;
        return `第${sectionIdx}部`;
    }

    function getQuestionKey(q) {
        if (q && (typeof q.id === 'number' || typeof q.id === 'string')) return String(q.id);
        if (q && typeof q.question_text === 'string') return `${q.topic ?? ''}|${q.type ?? ''}|${q.question_text}`;
        return JSON.stringify(q);
    }

    function hasEnoughRearrangeWords(q) {
        if (q?.type !== 'Rearrange') return true;
        try {
            const words = typeof q.options === 'string' ? JSON.parse(q.options) : q.options;
            return Array.isArray(words) && words.filter(w => String(w ?? '').trim()).length >= 8;
        } catch {
            return false;
        }
    }

    async function signInWithGoogle() {
        const { data: sessData } = await dbClient.auth.getSession();
        const currentUser = sessData?.session?.user || null;
        const currentUid = currentUser?.id ? String(currentUser.id) : null;
        if (currentUid && currentUser?.is_anonymous) {
            try {
                const anonHistory = await fetchOwnHistoryQuestionIds(currentUid, 5000);
                localStorage.setItem('pending_history_migration', JSON.stringify({ fromUid: currentUid, qids: anonHistory, ts: Date.now() }));
            } catch(e) { console.error('讀取匿名歷史失敗:', e); }
        }
        const { error } = await dbClient.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: window.location.origin + window.location.pathname }
        });
        if (error) throw error;
    }

    async function migratePendingHistoryIfAny() {
        const raw = localStorage.getItem('pending_history_migration');
        if (!raw) return;
        let parsed;
        try { parsed = JSON.parse(raw); } catch { return; }
        if (!parsed || !Array.isArray(parsed.qids)) return;
        const { data } = await dbClient.auth.getSession();
        const user = data?.session?.user || null;
        const uid = user?.id ? String(user.id) : null;
        if (!uid || user?.is_anonymous) return;
        const rows = parsed.qids.map(qid => ({ user_id: uid, question_id: Number(qid) })).filter(r => Number.isFinite(r.question_id));
        if (rows.length > 0) {
            const { error } = await dbClient.from('user_history').insert(rows, { ignoreDuplicates: true });
            if (error) console.error('搬移歷史失敗:', error);
        }
        localStorage.removeItem('pending_history_migration');
    }

    async function loadFilterOptions() {
        const { data, error } = await dbClient.from('questions').select('grade, subject, topic, type');
        if (error) return;
        databaseStructure = {};
        databaseTypeCounts = {};
        data.forEach(row => {
            if (isBannedTopic(row.topic)) return;
            if (!databaseStructure[row.grade]) databaseStructure[row.grade] = {};
            if (!databaseStructure[row.grade][row.subject]) databaseStructure[row.grade][row.subject] = {};
            if (!databaseTypeCounts[row.grade]) databaseTypeCounts[row.grade] = {};
            if (!databaseTypeCounts[row.grade][row.subject]) databaseTypeCounts[row.grade][row.subject] = {};
            
            const isPrimary = PRIMARY_GRADES.includes(row.grade);
            
            if (isPrimary) {
                // P1-P6：直接用 topic 名稱，不分題型
                if (!databaseStructure[row.grade][row.subject][row.topic]) {
                    databaseStructure[row.grade][row.subject][row.topic] = new Set();
                }
                databaseStructure[row.grade][row.subject][row.topic].add('all'); // 標記為包含所有題型
                if (!databaseTypeCounts[row.grade][row.subject][row.topic]) databaseTypeCounts[row.grade][row.subject][row.topic] = {};
                databaseTypeCounts[row.grade][row.subject][row.topic].all =
                    (databaseTypeCounts[row.grade][row.subject][row.topic].all || 0) + 1;
            } else {
                // S1-S6：提取基礎 topic，按題型分組
                const baseTopic = row.topic.replace(/\s*-\s*(選擇題|填充題|配對題|是非題|短問答|長問答|資料題|重組句子|重組段落|其他)$/, '');
                if (!databaseStructure[row.grade][row.subject][baseTopic]) {
                    databaseStructure[row.grade][row.subject][baseTopic] = new Set();
                }
                databaseStructure[row.grade][row.subject][baseTopic].add(row.type);
                if (!databaseTypeCounts[row.grade][row.subject][baseTopic]) databaseTypeCounts[row.grade][row.subject][baseTopic] = {};
                databaseTypeCounts[row.grade][row.subject][baseTopic][row.type] =
                    (databaseTypeCounts[row.grade][row.subject][baseTopic][row.type] || 0) + 1;
            }

    function getActiveHistoryBookConfig() {

    function updateTopicList() {
        const g = document.getElementById('gradeSelect').value;
        const s = document.getElementById('subjectSelect').value;
        if (!PRIMARY_GRADES.includes(g) && s === '歷史') {
            const sel = document.getElementById('historyBookSelect');
            if (sel && sel.value) setSelectedHistoryBookId(g, sel.value);
        }
        const topics = databaseStructure[g]?.[s];
        const topicsContainer = document.getElementById('topicsContainer');
        if (!topics || Object.keys(topics).length === 0) {
            topicsContainer.innerHTML = '<div style="padding:20px;text-align:center;color:#aaa;font-size:0.85rem;">此年級暫無題庫資料</div>';
            return;
        }
        
        const isPrimary = PRIMARY_GRADES.includes(g);
        
        // P1-P6：單層選單（舊版）
        if (isPrimary) {
            const allTopics = new Set();
            Object.keys(topics).forEach(baseTopic => {
                allTopics.add(baseTopic);
            });
            topicsContainer.innerHTML = Array.from(allTopics).sort().map(t => `
                <div class="topic-subrow" style="padding-left:12px;">
                    <span class="topic-name">${t}</span>
                    <input type="number" min="0" max="40" value="0" class="topic-qty manual-qty-control" data-topic="${t}" data-type="">
                </div>`).join('');
            updateQuestionModeUI();
            return;
        }
        
        // S1-S6：二級選單（新版）
        const typeLabels = {
            'MC': '選擇題',
            'FillBlank': '填充題',
            'Matching': '配對題',
            'TrueFalse': '是非題',
            'ShortAnswer': '短問答',
            'LongAnswer': '長問答',
            'DataQuestion': '資料題',
            'QA': '短問答',
            '問答題': '短問答',
            'Rearrange': '重組句子',
            'RearrangeParagraph': '重組段落'
        };
        
        function compareTopicOrder(a, b) {
            const ma = String(a).match(/^課題(\d+)/);
            const mb = String(b).match(/^課題(\d+)/);
            if (ma && mb) {
                const na = Number(ma[1]);
                const nb = Number(mb[1]);
                if (na !== nb) return na - nb;
            } else if (ma) {
                return -1;
            } else if (mb) {
                return 1;
            }
            return String(a).localeCompare(String(b), 'zh-HK');
        }

        const activeBook = getActiveHistoryBookConfig();
        const allowedTopicSet = (activeBook && Array.isArray(activeBook.topics) && activeBook.topics.length > 0)
            ? new Set(activeBook.topics.map(x => String(x).trim()).filter(Boolean))
            : null;
        const bookOrder = (activeBook && Array.isArray(activeBook.topics))
            ? new Map(activeBook.topics.map((t, i) => [String(t).trim(), i]))
            : null;

        function compareWithBookOrder(a, b) {
            if (bookOrder) {
                const ia = bookOrder.get(String(a).trim());
                const ib = bookOrder.get(String(b).trim());
                const ha = Number.isFinite(ia);
                const hb = Number.isFinite(ib);
                if (ha && hb) return ia - ib;
                if (ha) return -1;
                if (hb) return 1;
            }
            return compareTopicOrder(a, b);
        }

        let html = '';
        Object.keys(topics)
            .filter(baseTopic => !allowedTopicSet || allowedTopicSet.has(String(baseTopic).trim()))
            .sort(compareWithBookOrder)
            .forEach(baseTopic => {
            const types = Array.from(topics[baseTopic]).sort((a, b) => {
                const oa = getTypeOrderIndex(a);
                const ob = getTypeOrderIndex(b);
                if (oa !== ob) return oa - ob;
                return String(a).localeCompare(String(b), 'zh-HK');
            });
            const groupId = `group-${baseTopic.replace(/\s+/g, '-')}`;
            
            const mergedMembers = Array.isArray(SECONDARY_HISTORY_TOPIC_MERGE[baseTopic]) ? SECONDARY_HISTORY_TOPIC_MERGE[baseTopic] : null;
            const mergedAttr = mergedMembers ? escapeHtml(JSON.stringify(mergedMembers)) : '';

            html += `<div class="topic-group-header" onclick="toggleTopicGroup('${groupId}', event)">
                <span class="topic-left">
                    <input type="checkbox" class="topic-pick hidden" data-topic="${baseTopic}" data-topics="${mergedAttr}" onclick="event.stopPropagation()">
                    <span><span class="topic-toggle" id="${groupId}-toggle">▶</span> ${baseTopic}</span>
                </span>
                <span style="font-size:0.75rem;color:#999;">${types.length} 種題型</span>
            </div>`;
            
            types.forEach(type => {
                const typeLabel = typeLabels[type] || type;
                const typeCount = databaseTypeCounts[g]?.[s]?.[baseTopic]?.[type] || 0;
                html += `<div class="topic-subrow hidden" data-group="${groupId}">
                    <span class="topic-type-label">${typeLabel}（現有 ${typeCount} 題）</span>
                    <input type="number" min="0" max="40" value="0" class="topic-qty manual-qty-control" 
                           data-topic="${baseTopic}" data-topics="${mergedAttr}" data-type="${type}">
                </div>`;
            });

            if (types.length === 0) {
                html += `<div class="topic-subrow hidden" data-group="${groupId}">
                    <span class="topic-type-label" style="color:#999;">暫無題型（上載題目後可出卷）</span>
                    <span style="font-size:0.82rem;color:#bbb;">--</span>
                </div>`;
            }
        });
        
        topicsContainer.innerHTML = html;
        updateQuestionModeUI();
    }
    
    function toggleTopicGroup(groupId, evt) {
        if (evt && evt.target && evt.target.closest('.topic-pick')) return;
        const subrows = document.querySelectorAll(`[data-group="${groupId}"]`);
        const toggle = document.getElementById(`${groupId}-toggle`);
        const isExpanded = toggle.classList.contains('expanded');
        
        subrows.forEach(row => {
            if (isExpanded) {
                row.classList.add('hidden');
            } else {
                row.classList.remove('hidden');
            }
        });
        
        if (isExpanded) {
            toggle.classList.remove('expanded');
        } else {
            toggle.classList.add('expanded');
        }
    }

                    finalHtml += `<div class="question-item">
                        <div style="display:flex;align-items:flex-start;gap:10px;">
                            <span style="font-size:1.1rem;font-weight:900;min-width:28px;">${globalIdx++}.</span>
                            <p style="font-size:1.1rem;line-height:1.9;flex:1;">${sentence}</p>
                        </div>
                        <div class="answer-block" style="margin-top:10px;padding:10px 14px;background:#fffbeb;border-left:4px solid #f0c040;border-radius:4px;">
                            <span style="font-weight:700;color:#b8860b;">💡 建議答案：</span>
                            <span style="font-size:1.1rem;font-weight:700;">${w}</span>
                        </div>
                    </div>`;
                });
            } catch(error) {
                const msg = error?.message || String(error);
                finalHtml += `<p style="color:#c0392b;padding:12px;background:#fef0f0;border-radius:6px;margin-bottom:16px;">⚠️ AI 生成出錯：${msg}</p>`;
            }
        }

        let session;
        try { session = await ensureAnonymousAuth(); } catch(e) { console.error("匿名登入失敗:", e); }
        const uid = session?.user?.id ? String(session.user.id) : null;
        // g / s 已在上面讀取
        const qtyInputs = document.querySelectorAll('.topic-qty');
        const BATCH_SIZE = 100, MAX_FETCH = 500, RANDOM_POOL_SIZE = 50;
        const usedQuestionKeys = new Set(), usedQuestionIds = new Set();
        const mode = getQuestionMode();

        if (uid) {
            const { data: hist } = await dbClient.from('user_history').select('question_id').eq('user_id', uid).limit(5000);
            if (Array.isArray(hist)) hist.forEach(r => { if (r?.question_id != null) { usedQuestionIds.add(String(r.question_id)); usedQuestionKeys.add(String(r.question_id)); } });
        }

        function clampQty(v, max = 120) {
            let x = parseInt(v, 10);
            if (!Number.isFinite(x)) x = 0;
            return Math.max(0, Math.min(max, x));
        }

        function splitEvenly(total, n) {
            if (n <= 0 || total <= 0) return [];
            const base = Math.floor(total / n);
            const rem = total % n;
            return Array.from({ length: n }, (_, i) => base + (i < rem ? 1 : 0));
        }

        async function fetchPool(topicsOrTopic, requestedType, wantQty) {
            const topicList = Array.isArray(topicsOrTopic)
                ? topicsOrTopic.map(x => String(x || '').trim()).filter(Boolean)
                : [String(topicsOrTopic || '').trim()].filter(Boolean);
            if (topicList.length === 0) return [];

            if (topicList.length > 1) {
                let merged = [];
                for (const t of topicList) {
                    const sub = await fetchPool(t, requestedType, wantQty);
                    merged = merged.concat(sub);
                }
                return merged;
            }

            const topic = topicList[0];
            let pool = [], offset = 0;
            const fetchLimit = Math.min(MAX_FETCH, Math.max(Math.max(RANDOM_POOL_SIZE, wantQty * 3), BATCH_SIZE));
            const mergeP5And小五 = topic === '修辭手法辨別' && s === '中文' && (g === 'P5' || g === '小五');
            const isPrimary = PRIMARY_GRADES.includes(g);
            const typeAliases = {
                Matching: ['Matching', '配對', '配對題'],
                TrueFalse: ['TrueFalse', '是非', '是非題'],
                ShortAnswer: ['ShortAnswer', 'QA', '問答題', '短問答', '短答'],
                LongAnswer: ['LongAnswer', '長問答', '長答'],
                DataQuestion: ['DataQuestion', '資料題', '資料題目']
            };
            while (pool.length < fetchLimit) {
                let q;
                if (isPrimary || !requestedType) {
                    q = dbClient.from('questions').select('*').eq('subject', s).eq('topic', topic);
                } else {
                    q = dbClient.from('questions').select('*').eq('subject', s);
                    const aliases = typeAliases[requestedType];
                    if (Array.isArray(aliases)) q = q.in('type', aliases);
                    else q = q.eq('type', requestedType);
                    q = q.or(`topic.eq.${topic},topic.eq.${topic} - 選擇題,topic.eq.${topic} - 填充題,topic.eq.${topic} - 配對題,topic.eq.${topic} - 是非題,topic.eq.${topic} - 短問答,topic.eq.${topic} - 長問答,topic.eq.${topic} - 資料題,topic.eq.${topic} - 重組句子,topic.eq.${topic} - 重組段落`);
                }
                if (mergeP5And小五) q = q.in('grade', ['P5', '小五']);
                else q = q.eq('grade', g);
                const { data, error } = await q.range(offset, offset + BATCH_SIZE - 1);
                if (error || !data || data.length === 0) break;
                pool = pool.concat(data);
                offset += BATCH_SIZE;
                if (data.length < BATCH_SIZE) break;
            }
            if (mergeP5And小五 && pool.length > 0) {
                const seenId = new Set();
                pool = pool.filter(row => {
                    if (row.id == null) return true;
                    const id = String(row.id);
                    if (seenId.has(id)) return false;
                    seenId.add(id);
                    return true;
                });
            }
            return pool.filter(hasEnoughRearrangeWords);
        }

        function pushPickedFromPool(pool, qty, topic, out) {
            if (qty <= 0 || !Array.isArray(pool) || pool.length === 0) return 0;
            const shuffled = shuffleInPlace([...pool]);
            const before = out.length;
            const seenRhetoricAnswers = topic === '修辭手法辨別' ? new Set() : null;
            for (const q of shuffled) {
                const key = getQuestionKey(q);
                const qid = (q && (typeof q.id === 'number' || typeof q.id === 'string')) ? String(q.id) : null;
                if (qid && usedQuestionIds.has(qid)) continue;
                if (usedQuestionKeys.has(key)) continue;
                if (seenRhetoricAnswers) {
                    const ans = String(q.answer ?? '').trim();
                    if (!ans || seenRhetoricAnswers.has(ans)) continue;
                    seenRhetoricAnswers.add(ans);
                }
                usedQuestionKeys.add(key);
                if (qid) usedQuestionIds.add(qid);
                out.push(q);
                if (out.length - before >= qty) break;
            }
            return out.length - before;
        }

        // 第一階段：收集所有選中的題目
        const allPickedQuestions = [];
        if (mode === 'manual') {
            for (let input of qtyInputs) {
                let qty = clampQty(input.value, 40);
                if (qty <= 0) continue;
                const topic = input.dataset.topic;
                let topicList = null;
                try {
                    const raw = input.dataset.topics;
                    if (raw) {
                        const parsed = JSON.parse(raw);
                        if (Array.isArray(parsed) && parsed.length > 0) topicList = parsed;
                    }
                } catch {}
                const requestedType = input.dataset.type;
                if (isBannedTopic(topic)) continue;
                const pool = await fetchPool(topicList || topic, requestedType, qty);
                if (pool.length === 0) continue;
                pushPickedFromPool(pool, qty, topic, allPickedQuestions);
            }
        } else {
            const selectedTopics = Array.from(document.querySelectorAll('.topic-pick:checked'))
                .map(el => {
                    const display = String(el.dataset.topic || '').trim();
                    let members = null;
                    try {
                        const raw = el.dataset.topics;
                        if (raw) {
                            const parsed = JSON.parse(raw);
                            if (Array.isArray(parsed) && parsed.length > 0) members = parsed;
                        }
                    } catch {}
                    return { display, members };
                })
                .filter(x => x.display);
            const uniqTopics = [];
            const uniqTopicKey = new Set();
            selectedTopics.forEach(t => {
                const key = t.display;
                if (uniqTopicKey.has(key)) return;
                uniqTopicKey.add(key);
                uniqTopics.push(t);
            });
            if (uniqTopics.length === 0) {
                loading.style.display = 'none';
                alert('請先剔選至少一個課題。');
                return;
            }

            const typeTotals = [
                { type: 'MC', total: clampQty(document.getElementById('totalMcInput')?.value, 120) },
                { type: 'FillBlank', total: clampQty(document.getElementById('totalFillBlankInput')?.value, 120) },
                { type: 'Matching', total: clampQty(document.getElementById('totalMatchingInput')?.value, 120) },
                { type: 'TrueFalse', total: clampQty(document.getElementById('totalTrueFalseInput')?.value, 120) },
                { type: 'ShortAnswer', total: clampQty(document.getElementById('totalShortAnswerInput')?.value, 120) },
                { type: 'LongAnswer', total: clampQty(document.getElementById('totalLongAnswerInput')?.value, 120) },
                { type: 'DataQuestion', total: clampQty(document.getElementById('totalDataQuestionInput')?.value, 120) }
            ].filter(x => x.total > 0);
            if (typeTotals.length === 0) {
                loading.style.display = 'none';
                alert('請先輸入至少一種題型的總題數。');
                return;
            }

            for (const { type, total } of typeTotals) {
                const plan = splitEvenly(total, uniqTopics.length);
                let needFill = 0;
                for (let i = 0; i < uniqTopics.length; i++) {
                    const item = uniqTopics[i];
                    const targetQty = plan[i];
                    if (targetQty <= 0) continue;
                    const pool = await fetchPool(item.members || item.display, type, targetQty);
                    const picked = pushPickedFromPool(pool, targetQty, item.display, allPickedQuestions);
                    if (picked < targetQty) needFill += (targetQty - picked);
                }
                if (needFill > 0) {
                    let mergedPool = [];
                    for (const item of uniqTopics) {
                        const pool = await fetchPool(item.members || item.display, type, needFill);
                        mergedPool = mergedPool.concat(pool);
                    }
                    pushPickedFromPool(mergedPool, needFill, '', allPickedQuestions);
                }
            }
        }

        // 第二階段：按題型分組
        const questionsByType = {};
        allPickedQuestions.forEach(q => {
            const type = q.type || 'Other';
            if (!questionsByType[type]) questionsByType[type] = [];
            questionsByType[type].push(q);
        });

        // 第三階段：按題型渲染
        const typeLabels = {
            'MC': '選擇題',
            'FillBlank': '填充題',
            'TrueFalse': '是非題',
            'Matching': '配對題',
            'ShortAnswer': '短問答',
            'LongAnswer': '長問答',
            'DataQuestion': '資料題',
            'QA': '短問答',
            '問答題': '短問答',
            'Rearrange': '重組句子',
            'RearrangeParagraph': '重組段落',
            'Other': '其他題型'
        };

        const orderedTypeEntries = Object.entries(questionsByType).sort((a, b) => {
            const oa = getTypeOrderIndex(a[0]);
            const ob = getTypeOrderIndex(b[0]);
            if (oa !== ob) return oa - ob;
            return String(a[0]).localeCompare(String(b[0]), 'zh-HK');
        });

        for (const [type, questions] of orderedTypeEntries) {
            if (!questions || questions.length === 0) continue;
            
            sectionIdx += 1;
            if (customWords && sectionIdx === 1) sectionIdx = 2;
            const partLabel = getSectionLabel(sectionIdx);
            const typeLabel = typeLabels[type] || type;
            finalHtml += `<h3 style="font-family:'Noto Serif TC',serif;font-size:1.05rem;font-weight:700;margin:32px 0 16px;padding:8px 14px;background:#f5f2ec;border-left:4px solid #1a4a8a;">${partLabel}：${typeLabel}</h3>`;
            
            // 特殊題型的提示
            const firstTopic = questions[0]?.topic || '';
            if (firstTopic === '標點符號') {
                const punctSectionHint = widenIdeographicSpacing('在適當的位置加上標點符號。');
                finalHtml += `<div style="margin:4px 0 20px 10px;padding:0 4px;font-family:'Noto Serif TC',serif;font-size:1.05rem;line-height:2.2;color:#2a2a4a;">${escapeHtml(punctSectionHint)}</div>`;
            }
            if (firstTopic === '修辭手法辨別') {
                finalHtml += `<div style="margin-bottom:12px;margin-left:8px;color:#4a4a6a;font-size:1rem;">下列句子中運用了哪種修辭手法？把答案填在( ________ )上。</div>`;
                const refOptions = shuffleInPlace(questions.map(q => String(q.answer).trim()).filter(Boolean));
                const optionRows = refOptions.map((text, i) =>
                    `<span style="display:inline-block;margin:4px 14px 4px 0;"><strong>${String.fromCharCode(65 + i)}.</strong> ${escapeHtml(text)}</span>`
                ).join('');
                finalHtml += `<div style="border:2px solid #1a1a2e;padding:14px 16px;margin-bottom:20px;background:#faf9f6;border-radius:6px;">
                    <div style="font-weight:700;margin-bottom:10px;color:#1a1a2e;">參考選項（次序已隨機排列，請從中選填；每題答案須不同）</div>
                    <div style="font-size:1rem;line-height:1.8;">${optionRows}</div>
                </div>`;
            }
            
            if (type === 'Matching') {
                const matchingGroups = splitMatchingGroups(questions, 5, 10);
                matchingGroups.forEach(chunk => {
                    finalHtml += renderMatchingSectionBlock(chunk, globalIdx);
                    globalIdx += chunk.length;
                });
            } else {
                questions.forEach(q => { finalHtml += renderUniversal(q, globalIdx++); });
            }
        }

        // 寫入歷史
        if (uid && allPickedQuestions.length > 0) {
            const rows = allPickedQuestions.map(q => (q && (typeof q.id === 'number' || typeof q.id === 'string')) ? ({ user_id: uid, question_id: Number(q.id) }) : null).filter(Boolean);
            if (rows.length > 0) {
                const { error: insertError } = await dbClient.from('user_history').insert(rows, { ignoreDuplicates: true });
                if (insertError) console.error("寫入歷史失敗:", insertError);
            }
        }

        container.innerHTML = finalHtml;
        document.getElementById('pdfPrintArea').style.display = 'block';
        document.getElementById('downloadStudentBtn').classList.remove('hidden');
        document.getElementById('downloadTeacherBtn').classList.remove('hidden');
        loading.style.display = 'none';
    }

    function splitMatchingGroups(questions, minPerGroup = 5, maxPerGroup = 10) {
        const list = Array.isArray(questions) ? questions : [];
        const n = list.length;
        if (n === 0) return [];
        if (n <= maxPerGroup) return [list];
        if (minPerGroup <= 0 || maxPerGroup < minPerGroup) return [list];

        // 先以「每組不超過 max」估算組數，再保證每組不少於 min。
        let groupCount = Math.ceil(n / maxPerGroup);
        while (groupCount > 1 && Math.floor(n / groupCount) < minPerGroup) groupCount -= 1;

        const base = Math.floor(n / groupCount);
        const rem = n % groupCount;
        const groups = [];
        let offset = 0;
        for (let i = 0; i < groupCount; i++) {
            const size = base + (i < rem ? 1 : 0);
            groups.push(list.slice(offset, offset + size));
            offset += size;
        }
        return groups.filter(g => g.length > 0);
    }

    function renderMatchingSectionBlock(questions, startIdx) {
        if (!Array.isArray(questions) || questions.length === 0) return '';
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const stripOptPrefix = (s) => String(s ?? '').replace(/^[A-Za-z]\.\s*/, '').trim();
        const stripMatchPrefix = (s) => String(s ?? '').replace(/^請將題目與正確答案配對[:：]\s*/, '').trim();

        const leftItems = questions.map((q, i) => {
            let opts = [];
            try { opts = typeof q.options === 'string' ? JSON.parse(q.options) : q.options; } catch {}
            if (!Array.isArray(opts)) opts = [];
            const answerLetter = String(q.answer ?? '').trim().charAt(0).toUpperCase();
            const answerIdx = answerLetter ? letters.indexOf(answerLetter) : -1;
            let answerText = (answerIdx >= 0 && answerIdx < opts.length) ? stripOptPrefix(opts[answerIdx]) : '';
            if (!answerText && opts.length > 0) answerText = stripOptPrefix(opts[0]);
            if (!answerText) answerText = String(q.answer ?? '').trim();
            return {
                id: i,
                num: startIdx + i,
                questionText: stripMatchPrefix(q.question_text),
                answerText
            };
        });

        const rightItems = shuffleInPlace(leftItems.map(item => ({ id: item.id, text: item.answerText })));
        const answerLetterById = new Map();
        rightItems.forEach((item, idx) => answerLetterById.set(item.id, letters[idx]));

        const leftHtml = leftItems.map(item =>
            `<div style="margin-bottom:8px;line-height:1.8;"><strong>${item.num}.</strong> ${escapeHtml(item.questionText)}</div>`
        ).join('');
        const rightHtml = rightItems.map((item, idx) =>
            `<div style="margin-bottom:8px;line-height:1.8;"><strong>${letters[idx]}.</strong> ${escapeHtml(item.text)}</div>`
        ).join('');
        const answerLineHtml = leftItems.map(item =>
            `<div style="line-height:1.9;"><strong>${item.num}.</strong> ________</div>`
        ).join('');
        const answerKeyHtml = leftItems.map(item =>
            `<span style="display:inline-block;min-width:72px;"><strong>${item.num}</strong>-${answerLetterById.get(item.id)}</span>`
        ).join('');

        return `<div class="question-item" style="margin-bottom:26px;">
            <div style="font-size:1rem;color:#555;margin-bottom:10px;">請將左欄題目與右欄答案配對，並在下方填上答案字母。</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px 26px;">
                <div style="border:1px solid #ddd;border-radius:8px;padding:12px;background:#fff;">
                    <div style="font-weight:700;margin-bottom:8px;">左欄（題目）</div>
                    ${leftHtml}
                </div>
                <div style="border:1px solid #ddd;border-radius:8px;padding:12px;background:#fff;">
                    <div style="font-weight:700;margin-bottom:8px;">右欄（答案）</div>
                    ${rightHtml}
                </div>
            </div>
            <div style="margin-top:12px;border:1px solid #ddd;border-radius:8px;padding:12px;background:#fff;">
                <div style="font-weight:700;margin-bottom:8px;">作答區（填 A-${letters[Math.max(0, leftItems.length - 1)]}）</div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;">${answerLineHtml}</div>
            </div>
            <div class="answer-block" style="margin-top:12px;padding:10px 14px;background:#f0f7ff;border-left:4px solid #1a4a8a;border-radius:4px;">
                <span style="font-weight:700;color:#1a4a8a;">💡 配對答案：</span>
                <div style="margin-top:6px;line-height:1.9;">${answerKeyHtml}</div>
            </div>
        </div>`;
    }

    function renderUniversal(q, idx) {
        let body = '';
        function formatQuestionHtml(raw, topic) {
            if (raw == null) return '';
            // 題庫有時存字面「\n」「\ n」而非真正換行，先還原成換行以免畫面出現 \　n
            let t = String(raw)
                .replace(/\r\n/g, '\n')
                .replace(/\\\s*(?:r|n)/gi, '\n');
            if (topic === '標點符號') {
                const kept = t.split(/\r?\n/).map(l => normalizePunctuationTopicLine(l)).map(l => l.replace(/\s+$/g, '')).filter(l => l.length > 0);
                const widened = widenIdeographicSpacing(kept.join('\n'));
                return `<div style="white-space:pre-wrap;line-height:2.2;font-size:1.1rem;letter-spacing:0;">${escapeHtml(widened)}</div>`;
            }
            t = t.replace(/\(\s*\)/g, '( ________ )').replace(/\(\s*__+\s*\)/g, '( ________ )');
            const lines = t.split(/\r?\n/).map(l => l.trim()).filter(Boolean)
                .filter(l => !/^句意辨析[:：]/.test(l))
                .filter(l => !/^下列句子中運用了哪種修辭手法/.test(l))
                .map(l => l.replace(/^\d+\.\s*/, ''));
            let joined = lines.join('\n').replace(/\n\d+\.\s*/g, '\n');
            if (topic === '修辭手法辨別') {
                const hasBlank = /\(\s*_{2,}\s*\)/.test(joined);
                if (!hasBlank) joined = joined.trimEnd() + ' ( ________ )';
            }
            return joined.replace(/\n/g, '<br>');
        }

        if (q.type === 'Rearrange') {
            const words = typeof q.options === 'string' ? JSON.parse(q.options) : q.options;
            body = `<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;">${words.map(w => `<span style="border:2px solid #4a4a6a;padding:4px 12px;border-radius:6px;background:white;">${w}</span>`).join('')}</div>
                    <div style="margin-top:16px;border-bottom:2px solid #1a1a2e;height:32px;"></div>`;
        } else if (q.type === 'RearrangeParagraph') {
            const sents = typeof q.options === 'string' ? JSON.parse(q.options) : q.options;
            const nums = ['①','②','③','④','⑤','⑥','⑦','⑧'];
            body = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px 32px;margin-top:10px;">${sents.map((s,i)=>`<div style="display:flex;align-items:flex-start;gap:8px;border-bottom:1px solid #eee;padding-bottom:6px;"><span style="font-weight:700;color:#1a4a8a;">${nums[i]}</span><p style="font-size:1rem;">${s}</p></div>`).join('')}</div>
                    <div style="margin-top:20px;display:flex;align-items:center;gap:4px;font-weight:700;">正確次序：${sents.map(()=>`<div style="border:2px solid #1a1a2e;width:32px;height:32px;"></div>`).join('<span style="margin:0 4px;">→</span>')}</div>`;
        } else if (q.type === 'TrueFalse') {
            body = `<div style="font-size:1.1rem;line-height:1.9;">${formatQuestionHtml(q.question_text, q.topic)}</div>
                    <div style="margin-top:12px;font-size:1rem;line-height:1.8;">作答：____________（是 / 非）</div>`;
        } else if (q.type === 'LongAnswer') {
            body = `<div style="font-size:1.1rem;line-height:1.9;">${formatQuestionHtml(q.question_text, q.topic)}</div>
                    <div style="margin-top:12px;">
                        <div style="border-bottom:1.8px solid #1a1a2e;height:30px;"></div>
                        <div style="border-bottom:1.8px solid #1a1a2e;height:30px;margin-top:6px;"></div>
                        <div style="border-bottom:1.8px solid #1a1a2e;height:30px;margin-top:6px;"></div>
                    </div>`;
        } else if (q.type === 'MC' || (q.options && q.options.length > 0)) {
            try {
                const opts = typeof q.options === 'string' ? JSON.parse(q.options) : q.options;
                if (Array.isArray(opts) && opts.length > 0) {
                    const optHtml = (o) => (q.topic === '標點符號' ? escapeHtml(widenIdeographicSpacing(String(o ?? ''))) : String(o ?? ''));
                    body = `<div style="font-size:1.1rem;line-height:1.9;">${formatQuestionHtml(q.question_text, q.topic)}</div>
                            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px 32px;margin-top:14px;font-size:1rem;">
                                <div>A. ${optHtml(opts[0])}</div><div>B. ${optHtml(opts[1])}</div>
                                <div>C. ${optHtml(opts[2])}</div><div>D. ${optHtml(opts[3])}</div>
                            </div>`;
                }
            } catch(e) { body = `<div style="font-size:1.1rem;line-height:1.9;">${formatQuestionHtml(q.question_text, q.topic)}</div>`; }
        } else {
            body = `<div style="font-size:1.1rem;line-height:1.9;">${formatQuestionHtml(q.question_text, q.topic)}</div>`;
        }

        return `<div class="question-item">
            <div style="display:flex;align-items:flex-start;gap:10px;">
                <span style="font-size:1.15rem;font-weight:900;min-width:28px;">${idx}.</span>
                <div style="flex:1;">${body}</div>
            </div>
            <div class="answer-block" style="margin-top:12px;padding:10px 14px;background:#f0f7ff;border-left:4px solid #1a4a8a;border-radius:4px;">
                <span style="font-weight:700;color:#1a4a8a;">💡 參考答案：</span>
                <span style="font-size:1.1rem;font-weight:700;">${q.topic === '標點符號' ? escapeHtml(widenIdeographicSpacing(String(q.answer ?? ''))) : (q.answer ?? '')}</span>
                <p style="color:#666;margin-top:6px;font-size:0.85rem;">解析：${q.explanation || '無'}</p>
            </div>
        </div>`;
    }

    function generatePDF(mode) {
        window.scrollTo(0, 0);
        document.querySelectorAll('.answer-block').forEach(el => el.style.setProperty('display', mode === 'student' ? 'none' : 'block', 'important'));
        html2pdf().set({
            margin: 15, filename: `混合練習_${mode}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak: { mode: 'css' }
        }).from(document.getElementById('pdfPrintArea')).save();
    }

    window.onload = async () => {
        document.getElementById('loginBtn').addEventListener('click', async () => {
            try { await signInWithGoogle(); }
            catch(e) { alert(`Google 登入失敗：${e.message || e}`); }
        });
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await dbClient.auth.signOut(); await ensureAnonymousAuth(); await updateAuthUI();
        });
        dbClient.auth.onAuthStateChange(async () => { await migratePendingHistoryIfAny(); await updateAuthUI(); });
        try { await ensureAnonymousAuth(); } catch(e) { console.error("匿名登入失敗:", e); }
        await migratePendingHistoryIfAny();
        await updateAuthUI();
        await loadFilterOptions();
        updateHistoryBookUI();
        enforceModeAvailabilityByGrade();
    };
</script>
</body>
</html>
